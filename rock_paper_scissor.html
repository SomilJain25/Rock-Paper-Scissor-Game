<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="rock_paper_scissor.css">
</head>
<body>
    <h1>Rock Paper Scissors Game</h1>
    <div class="choises">
        <div class="choise" id="rock">
            <img src="images\download.png"/>
        </div>
        <div class="choise" id="paper">
            <img src="images\paper.png"/>
        </div>
        <div class="choise" id="scissor">
            <img src="images\67ebfd32e898b4ec3ae4e59ae33832c8.jpg"/>
        </div>
    </div>
<div class="score-board">
    <div class="score">
        <p id="userscore">0</p>
        <p>you</p>
    </div>
    <div class="score">
        <p id="computerscore">0</p>
        <p>computer</p>
    </div>
</div>
<div class="msg-container">
    <p id="msg" >Play Your Move</p>
</div>
<div class="button">
    <button class="btn">Reset Game</button>
</div>
<script src="rock_paper_scissor.js"></script>
</body>
</html>
